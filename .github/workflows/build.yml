name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-universal
            target: universal-apple-darwin
            extra_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            name: windows-x64
            target: ''
            extra_targets: ''

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.extra_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.name }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Build (macOS universal)
        if: matrix.target == 'universal-apple-darwin'
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run tauri build

      # --- 产物打包：免安装版 + 版本号命名 ---

      - name: Package macOS portable (.app.zip)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist
          APP_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          # zip 保留权限 + 符号链接，用 -y
          cd "$APP_DIR"
          zip -r -y "../../../../../../dist/SyncCopy-v${{ steps.version.outputs.version }}-macos-universal-portable.app.zip" "Sync Copy.app"
          cd -
          ls -la dist

      - name: Rename macOS dmg with version
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "dist/SyncCopy-v${{ steps.version.outputs.version }}-macos-universal.dmg"
          fi
          ls -la dist

      - name: Package Windows portable (raw .exe)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          # tauri 2 的 release binary 在 target/release 下，名字来自 Cargo.toml 的 package.name
          RAW_EXE="src-tauri/target/release/sync-copy.exe"
          if [ ! -f "$RAW_EXE" ]; then
            echo "::error::raw exe not found at $RAW_EXE"
            ls -la src-tauri/target/release
            exit 1
          fi
          cp "$RAW_EXE" "dist/SyncCopy-v${{ steps.version.outputs.version }}-win-x64-portable.exe"
          ls -la dist

      - name: Rename Windows MSI / NSIS with version
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          MSI=$(ls src-tauri/target/release/bundle/msi/*.msi 2>/dev/null | head -1)
          if [ -n "$MSI" ]; then
            cp "$MSI" "dist/SyncCopy-v${{ steps.version.outputs.version }}-win-x64.msi"
          fi
          NSIS=$(ls src-tauri/target/release/bundle/nsis/*.exe 2>/dev/null | head -1)
          if [ -n "$NSIS" ]; then
            cp "$NSIS" "dist/SyncCopy-v${{ steps.version.outputs.version }}-win-x64-setup.exe"
          fi
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync-copy-${{ matrix.name }}-v${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
